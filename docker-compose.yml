version: '3.8'

services:
  backend:
    build:
      context: ./casestudy_kumari
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://db:3306/customerproductmgmtdb
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  db:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=customerproductmgmtdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Initialize DB using the provided SQL script
      - ./casestudy_kumari/src/main/resources/Database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
